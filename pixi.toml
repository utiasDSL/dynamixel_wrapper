[workspace]
authors = [
    "Daniel San José Pro <42489409+danielsanjosepro@users.noreply.github.com>",
]
channels = ["conda-forge"]
name = "dynamixel-wrapper"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
dynamixel-motor-ros2 = "python -m scripts.dynamixel_motor_ros2"
dynamixel-motor-ros2-kilted-safe = "bash scripts/run_kilted_dynamixel_motor_ros2.sh"
calibrate-motor = "python -m scripts.calibrate_motor"

[pypi-dependencies]
dynamixel-wrapper = { path = ".", editable = true }
ruff = ">=0.14.3, <0.15"


[dependencies]
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
python = ">=3.11,<3.13"

[target.linux.dependencies]
libgl-devel = "*"

[environments]
humble = { features = ["humble"] }
jazzy = { features = ["jazzy"] }
kilted = { features = ["kilted"] }

# humble
[feature.humble]
channels = ["https://prefix.dev/robostack-humble"]

[feature.humble.activation]
scripts = ["scripts/set_env.sh"]

[feature.humble.dependencies]
ros-humble-desktop = "*"
colcon-common-extensions = "*"
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
ros-humble-rmw-zenoh-cpp = "*"
ros-humble-rmw-cyclonedds-cpp = "*"
rosdep = "*"

# jazzy
[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-desktop = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
colcon-common-extensions = "*"
rosdep = "*"

# kilted
[feature.kilted]
channels = ["https://prefix.dev/robostack-kilted"]

[feature.kilted.dependencies]
ros-kilted-desktop = "*"
ros-kilted-ros2-control = "*"
ros-kilted-ros2-controllers = "*"
ros-kilted-rmw-cyclonedds-cpp = "*"
colcon-common-extensions = "*"
rosdep = "*"
